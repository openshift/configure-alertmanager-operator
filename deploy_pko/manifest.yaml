apiVersion: manifests.package-operator.run/v1alpha1
kind: PackageManifest
metadata:
  name: configure-alertmanager-operator
  annotations:
    name: annotation
spec:
  scopes:
  - Cluster
  phases:
  - name: crds
  - name: namespace
  - name: cleanup-rbac
  - name: cleanup-deploy
  - name: rbac
  - name: deploy
  availabilityProbes:
  - probes:
    - condition:
        type: Available
        status: 'True'
    - fieldsEqual:
        fieldA: .status.updatedReplicas
        fieldB: .status.replicas
    selector:
      kind:
        group: apps
        kind: Deployment
  config:
    openAPIV3Schema:
      properties:
        image:
          description: Operator image to deploy
          type: string
          default: ""
        fedramp:
          description: FedRAMP mode flag
          type: string
          default: "false"
        version:
          description: Operator version tag for resource naming
          type: string
          default: "0000000"
          pattern: "^[a-z0-9][a-z0-9.-]*$"
          maxLength: 51
      type: object
test:
  template:
  - name: default
    context:
      package:
        metadata:
          name: configure-alertmanager-operator
          namespace: openshift-monitoring
      config:
        image: "quay.io/example/configure-alertmanager-operator:test"
        fedramp: "false"
        version: "testabc123"
  - name: fedramp
    context:
      package:
        metadata:
          name: configure-alertmanager-operator
          namespace: openshift-monitoring
      config:
        image: "quay.io/example/configure-alertmanager-operator:test"
        fedramp: "true"
        version: "testabc123"
